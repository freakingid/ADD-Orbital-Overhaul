    drawText("ASTEROID FIELD", VIEW_W/2, VIEW_H/2 - 120, 64);
    drawText("D E L U X E", VIEW_W/2, VIEW_H/2 - 60, 32, COLOR.satellite);
    drawText("ROTATE: ←→ / A D      THRUST: ↑ / W", VIEW_W/2, VIEW_H/2 + 30, 20, COLOR.dim);
    drawText("FIRE: SPACE      SHIELD: SHIFT      PAUSE: P", VIEW_W/2, VIEW_H/2 + 62, 20, COLOR.dim);
    drawText("BEWARE THE HUNTER SATELLITE", VIEW_W/2, VIEW_H/2 + 120, 18, COLOR.satellite);
    if (Math.floor(performance.now() / 600) % 2 === 0)
      drawText("PRESS ENTER TO START", VIEW_W/2, VIEW_H/2 + 180, 26);
    // decorative drifting debris lives in screen space (its own tiny wrapped field)
    titleDebris.forEach(a => {
      a.update(1/60);
      if (a.x < -60) a.x += VIEW_W + 120;
      if (a.x > VIEW_W + 60) a.x -= VIEW_W + 120;
      if (a.y < -60) a.y += VIEW_H + 120;
      if (a.y > VIEW_H + 60) a.y -= VIEW_H + 120;
      a.draw();
    });
    return;
  }

  // --- World space: translate so the camera (the ship) sits at screen center ---
  ctx.save();
  ctx.translate(VIEW_W/2 - game.camera.x, VIEW_H/2 - game.camera.y);
  if (game.dock) drawEntity(game.dock);
  game.particles.forEach(drawEntity);
  game.garbage.forEach(drawEntity);
  drawChain();
  game.debris.forEach(drawEntity);
  game.hunters.forEach(drawEntity);
  game.saucers.forEach(drawEntity);
  game.powerups.forEach(drawEntity);   // above hazards so pickups stay readable (F6)
  game.bullets.forEach(drawEntity);
  game.ship.draw();                 // always at the camera center
  game.floaters.forEach(drawEntity);
  ctx.restore();

  // --- HUD (screen space, drawn after restoring the untranslated context) ---
  drawText(String(game.score).padStart(6, "0"), 30, 46, 30, COLOR.text, "left");
  // hull HP bar (replaces the old life-ship icons; same stroke/fill style as the shield bar)
  const hpw = 140, hph = 8, hpx = 92, hpy = 62;
  ctx.strokeStyle = COLOR.dim;
  ctx.lineWidth = 1;
  ctx.strokeRect(hpx, hpy, hpw, hph);
  const hpFrac = Math.max(0, game.ship.hp) / SHIP_MAX_HP;
  ctx.fillStyle = hpFrac > 0.3 ? COLOR.hp : "#ff7060";
  ctx.fillRect(hpx + 1, hpy + 1, (hpw - 2) * hpFrac, hph - 2);
  drawText("HULL", hpx - 12, hpy + 8, 13, COLOR.dim, "right");
  drawText("CARGO " + game.chain.length + "/" + CHAIN_MAX, 30, 104, 16,
    game.chain.length ? COLOR.garbage : COLOR.dim, "left");
  // active-powerup row (F6): one row per running timed effect — a small type glyph + a
  // shield-bar-style remaining-duration bar. Health is instant, so it never appears here.
  let prow = 130;
  for (const t of POWERUP_DROP_TYPES) {          // rapid / triple / magnet / engine (stable order)
    const rem = game.powerFx[t];
    if (rem <= 0) continue;
    const c = POWERUP_COLOR[t];
    drawPowerupGlyph(t, 40, prow, 9, c);
    const pw = 96, ph = 6, ppx = 58, ppy = prow - 3;
    ctx.strokeStyle = COLOR.dim; ctx.lineWidth = 1;
    ctx.strokeRect(ppx, ppy, pw, ph);
    ctx.fillStyle = c;
    ctx.fillRect(ppx + 1, ppy + 1, (pw - 2) * (rem / POWERUP_DURATION), ph - 2);
    prow += 20;
  }
  // when hauling, a chevron orbiting screen-center points toward the (maybe off-screen) dock
  if (game.chain.length && game.dock && !game.ship.dead) {
    const a = angleTo(game.ship, game.dock);
    drawPoly([[7, 0], [-4, -4], [-4, 4]],
      VIEW_W/2 + Math.cos(a) * 42, VIEW_H/2 + Math.sin(a) * 42, a, COLOR.dock);
  }
  drawText("WAVE " + game.wave, VIEW_W - 30, 46, 22, COLOR.dim, "right");

  // shield energy bar
  const bw = 140, bh = 8, bx = VIEW_W - 30 - bw, by = 60;
  ctx.strokeStyle = COLOR.dim;
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, bw, bh);
  ctx.fillStyle = game.ship.energy > 0.25 ? COLOR.shield : "#ff7060";
  ctx.fillRect(bx + 1, by + 1, (bw - 2) * game.ship.energy, bh - 2);
  drawText("SHIELD", bx - 12, by + 8, 13, COLOR.dim, "right");

  if (game.paused) {
    drawText("PAUSED", VIEW_W/2, VIEW_H/2, 48);
  }

  if (game.state === "gameover") {
    drawText("GAME OVER", VIEW_W/2, VIEW_H/2 - 20, 56);
    drawText("FINAL SCORE  " + game.score, VIEW_W/2, VIEW_H/2 + 36, 26);
    if (Math.floor(performance.now() / 600) % 2 === 0)
      drawText("PRESS ENTER TO PLAY AGAIN", VIEW_W/2, VIEW_H/2 + 90, 22);
  }
}

// title screen decoration
const titleDebris = [];
for (let i = 0; i < 5; i++) {
  const a = new DebrisSatellite(rand(0, VIEW_W), rand(0, VIEW_H), 3);
  a.vx *= 0.5; a.vy *= 0.5;
  titleDebris.push(a);
}

// ---------- Main loop ----------
let last = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  pollGamepad();        // refresh the first-gamepad snapshot once per frame, before anything reads it
  handleGamepadMenu();  // edge-triggered controller menu/system actions (Start/A/B)
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
