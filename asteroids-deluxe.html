<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTEROID FIELD DELUXE</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: monospace;
  }
  #game-container {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  canvas {
    background: #000208;
    image-rendering: auto;
  }
</style>
</head>
<body>
<div id="game-container"><canvas id="game"></canvas></div>
<script>
"use strict";

/* ============================================================
   ASTEROID FIELD DELUXE — v1.8
   A vector-style arcade shooter in the spirit of Asteroids Deluxe
   - Energy shield (hold SHIFT) that deflects debris
   - Killer satellite that splits into homing wedge ships
   - Large & small saucers
   v1.1: Radioactive salvage — destroyed debris drops garbage canisters;
   fly over them to hook them into a physics-simulated tow chain, then
   haul the chain into the recycling dock for escalating bonus points.
   Cargo has mass: it cuts thrust/top speed and tugs the ship around.
   v1.2: Larger 3840x2160 wrapping world with a scrolling camera that keeps
   the ship centered; the 1280x720 canvas is now a viewport onto that world.
   v1.3: Discrete lives replaced by a single HP pool (SHIP_MAX_HP). Unshielded
   hits deal source-specific damage, shove the ship away (knockback), and grant
   ~1s of hit-stun i-frames; 0 HP is a permanent game over (no respawn). Score
   milestones now repair the hull instead of granting extra lives.
   v1.4: Asteroids redesigned as Debris Satellites — a broken-satellite silhouette
   with 3-way splits at large/medium (small tier is destroyed). Every tier's
   destruction emits exactly 3 garbage canisters (replacing the old probabilistic
   single drop), so the field carries far more salvage — GARBAGE_DECAY and the
   wave spawn count were trimmed to compensate. Garbage and chain nodes gained a
   `mass` field; chain thrust/top-speed/tug now scale with the chain's total mass
   (sum of node.mass), not its node count.
   v1.5: Global difficulty ramp — difficultyFactor(wave) climbs from ~0 at wave 1
   toward 1 over many waves (RAMP_WAVES is the single knob), and threat parameters
   interpolate floor->ceiling through it via ramp(). Applied to the saucers so early
   waves are calmer: longer gaps between saucers, slower fire, wider small-saucer aim,
   and a rarer (wave-driven, not score-gated) small saucer — all easing to the shipped
   intensity at full difficulty. Hunter/Satellite scaling is deferred to its Phase-5
   redesign.
   v1.6: Killer satellite + homing wedges redesigned into the Hunter Satellite — one diamond
   family with three tiers (3 large / 2 medium / 1 small). The large core drifts passively
   toward the ship (spawn-time aim, no re-aim); shooting it splits it 3-ways into medium then
   small children that actively home, each faster/more agile than the last. Every tier emits
   garbage; the small tier drops a larger burst of LOW-mass (0.5) scrap that tows easily and
   renders in a paler tint. All Hunter speeds/turn rates wire into the v1.5 difficulty ramp
   from the start (gentle wave-1 floor at HUNTER_FLOOR_FRAC of the ceiling, ramping up over
   ~20 waves). Hunter contact damage is 60/45/30 by tier; homers still die on shield contact
   (and split), the core bounces; Hunters still sever the tow chain.
   v1.7: Powerups — five free-floating pickups (each a distinct vector-glow icon). Health spawns
   ambiently on a saucer-like timer and instantly repairs +25 HP (capped); Rapid Fire, Triple Shot,
   Magnet and Engine drop from small-tier Debris/Hunter kills at POWERUP_DROP_CHANCE and last
   POWERUP_DURATION seconds. Rapid Fire doubles the bullet cap (4->8); Triple Shot fires a 3-bullet
   spread and triples the cap (4->12) — both active uses the higher cap (12), not 24. Magnet pulls
   free garbage toward the ship inside an extended radius (and widens the pickup radius); Engine
   halves the effective towed-mass sum (chainMass) so thrust/top-speed/tug all lighten. Same-type
   pickups refresh the duration (no magnitude stacking); different types stack. A HUD row shows each
   active timed effect with a shield-bar-style remaining-duration bar.
   v1.8: Gamepad support — the input layer now checks either keyboard OR the first connected gamepad
   through a data-driven `bindings` table (one entry per action, listing keyboard keys + gamepad
   buttons/axis), polled once per frame via navigator.getGamepads(). Defaults: D-Pad / Left Stick for
   rotate + thrust (25% deadzone), A to fire, right trigger/bumper for shield (a gap-fill — no shield
   binding was spec'd). Fixed menu/system reads wired now for later phases: A = confirm, B = back
   (reserved for F8's menus), Start = start/pause/unpause (Start toggles pause like P today). Call
   sites are unchanged (still input.left() etc.). Rebinding UI is Phase 8; these are hardcoded defaults.
   ============================================================ */

// ---------- Constants ----------
// The world is a large wrapping torus; the viewport is a camera window onto it.
const WORLD_W = 3840, WORLD_H = 2160;   // simulation space (the wrap boundary)
const VIEW_W = 1280, VIEW_H = 720;      // visible viewport = canvas size
const TAU = Math.PI * 2;

const SHIP_TURN = 4.2;          // rad/sec
const SHIP_THRUST = 340;        // px/sec^2
const SHIP_DRAG = 0.35;         // fraction of velocity lost per second
const SHIP_MAX_SPEED = 520;
const SHIP_RADIUS = 13;

const BULLET_SPEED = 620;
const BULLET_LIFE = 1.05;       // seconds
const MAX_BULLETS = 4;
const FIRE_COOLDOWN = 0.16;

const SHIELD_DRAIN = 0.55;      // energy/sec while on
const SHIELD_RECHARGE = 0.12;   // energy/sec while off
const SHIELD_HIT_COST = 0.22;   // energy per deflection
const SHIELD_RADIUS = 26;

const DEBRIS_SPEEDS = { 3: 70, 2: 110, 1: 160 };  // base drift speed by size
const DEBRIS_RADII  = { 3: 46, 2: 26, 1: 13 };
const DEBRIS_SCORE  = { 3: 20, 2: 50, 1: 100 };
const DEBRIS_GARBAGE = 3;       // canisters emitted at EVERY tier's destruction (F3)

const SAUCER_SCORE = { big: 200, small: 1000 };

// Hunter Satellites (F4) — the reshaped killer-satellite/wedge system: a diamond core that
// drifts passively toward the ship, then splits 3-ways into actively-homing children,
// emitting garbage at every tier. All speeds/turn rates are CEILINGS the difficulty ramp
// (§2.13) climbs toward; at wave 1 the whole family moves at HUNTER_FLOOR_FRAC of them, so
// early waves are gentle and full pressure arrives ~wave 20.
const HUNTER_RADII      = { 3: 24, 2: 15, 1: 10 };    // collision radius by tier
const HUNTER_SCORE      = { 3: 200, 2: 150, 1: 250 }; // large core / medium / small (small worth most — hardest to hit)
const HUNTER_DAMAGE     = { 3: 60, 2: 45, 1: 30 };    // contact damage — harder than the equivalent Debris tier (F2/F4)
const HUNTER_SPEED_CEIL = { 3: 70, 2: 120, 1: 175 };  // full-difficulty px/s: large drifts, medium/small home (anchored on the old wedge 120/175)
const HUNTER_TURN_CEIL  = { 3: 0, 2: 1.6, 1: 2.6 };   // full-difficulty homing turn rate (rad/s); large never turns (passive drift)
const HUNTER_FLOOR_FRAC = 0.58;   // wave-1 speeds & turn rates = this × ceiling (THE knob for early-game Hunter calm)
const HUNTER_SCATTER    = 0.6;    // sec a freshly-split homer scatters outward before homing engages
const HUNTER_GARBAGE       = 3;   // canisters from a large/medium kill (normal mass 1.0)
const HUNTER_SMALL_GARBAGE = 6;   // canisters from a small kill — a larger burst...
const HUNTER_SMALL_MASS    = 0.5; // ...of LOW-mass scrap (tows easier — a valuable bonus for finishing a Hunter line)

// Health, damage & knockback (F2) — a single HP pool replaces discrete lives
const SHIP_MAX_HP = 250;        // full hull integrity at game start; no respawns
const DMG_SMALL = 20;           // contact damage from a small hazard
const DMG_MEDIUM = 35;          // contact damage from a medium hazard
const DMG_LARGE = 50;           // contact damage from a large hazard
const DMG_BULLET = 15;          // damage from a hostile (saucer) bullet
const DEBRIS_DAMAGE = { 3: DMG_LARGE, 2: DMG_MEDIUM, 1: DMG_SMALL };
const KNOCKBACK_SPEED = 250;    // px/sec shove directly away from a hazard on an unshielded hit
const HIT_STUN_DURATION = 1.0;  // sec of hit-stun invulnerability granted after any non-lethal hit
const REPAIR_MILESTONE = 10000; // score interval that grants a hull-repair bonus (was: extra life)
const REPAIR_AMOUNT = 25;       // +HP granted at each milestone (capped at max)
const REPAIR_FULL_BONUS = 2500; // flat score awarded instead when already at full HP

// Radioactive salvage / tow chain / recycling dock
const GARBAGE_DECAY = 12;       // sec before uncollected garbage decays away (F3: shortened from 20 to hold on-screen canister density down against the higher drop volume)
const GARBAGE_SEVER_DECAY = 10; // sec decay for garbage knocked loose from a severed chain (was an inline 15; kept < GARBAGE_DECAY so loose scrap stays the more ephemeral)
const GARBAGE_PICKUP = 18;      // pickup radius from ship center

const CHAIN_LINK = 20;          // px between chain nodes
const CHAIN_MAX = 12;           // max towed canisters
const CHAIN_TUG = 26;           // ship pull-back accel per px of chain stretch
const CARGO_MASS = 0.12;        // tug mass-factor grows by this per unit of towed mass (F5: mass sum, not count)
const CARGO_THRUST = 0.10;      // thrust divisor grows by this per unit of towed mass
const CARGO_MAXSPD = 0.05;      // max-speed divisor grows by this per unit of towed mass

const DOCK_RADIUS = 44;
const DOCK_BASE_SCORE = 50;     // 1st canister of a visit
const DOCK_BONUS_STEP = 25;     // each additional canister: +25 over the last

// Larger world & scrolling camera (v1.2)
const CULL_MARGIN = 100;        // px beyond the viewport edge still worth drawing
const SPAWN_MIN_DIST = 220;     // new debris satellites: nearest allowed to the ship
const SPAWN_MAX_DIST = 1100;    // new debris satellites: farthest from the ship (stay reachable)
const DOCK_MIN_DIST = 260;      // recycling dock: nearest allowed to the ship
const DOCK_MAX_DIST = 900;      // recycling dock: farthest from the ship (stay reachable)
const STAR_DENSITY = 40;        // background stars per viewport-sized area of world

// Difficulty ramp & early-game pacing (F10) — one shared curve scales every wave-driven
// threat parameter from an easy wave-1 floor up to a full-intensity ceiling (see §2.6/§2.13).
const RAMP_WAVES = 8;           // THE knob: larger = slower ramp. Feeds difficultyFactor(wave);
                                // ~0 at wave 1, ~0.9 by wave 20, plateauing near 1 by ~wave 25.
// Saucer spawn gap (sec between saucers): wide early, tightening with difficulty.
// Re-expresses the old `rand(12,22) - min(6,wave)` as an interpolated rand(min,max) range.
const SAUCER_GAP_FLOOR_MIN = 20;  // wave-1 shortest gap between saucers
const SAUCER_GAP_FLOOR_MAX = 30;  // wave-1 longest gap
const SAUCER_GAP_CEIL_MIN  = 12;  // full-difficulty shortest gap (≈ shipped v1.1 cadence)
const SAUCER_GAP_CEIL_MAX  = 16;  // full-difficulty longest gap
// Saucer between-shot intervals: base [min,max] ranges, multiplied by the fire multiplier.
const SAUCER_FIRE_INIT  = [0.6, 1.4]; // delay before a saucer's first shot after entering
const SAUCER_FIRE_BIG   = [0.9, 1.6]; // big saucer reload (fires randomly)
const SAUCER_FIRE_SMALL = [0.7, 1.1]; // small saucer reload (fires aimed)
const SAUCER_FIRE_MULT_FLOOR = 1.8;   // wave-1: fire ~1.8× slower (longer between shots)
const SAUCER_FIRE_MULT_CEIL  = 1.0;   // full difficulty: shipped cadence
// Small-saucer aim error (rad): wide barely-aimed spray early, tightening to precise late.
const SAUCER_AIM_ERR_FLOOR = 0.35;    // wave-1 aim error
const SAUCER_AIM_ERR_CEIL  = 0.09;    // full-difficulty aim error (shipped precision)
// Small-saucer appearance chance: rare early, common late. Folds in the old >8000-pt gate
// so there's one wave-driven escalation system instead of two (F10 cleanup).
const SAUCER_SMALL_CHANCE_FLOOR = 0.15; // wave-1: mostly the harmless random-fire big saucer
const SAUCER_SMALL_CHANCE_CEIL  = 0.60; // full difficulty: the dangerous aimed 1000-pt saucer common

// Powerups (F6) — five free-floating pickups. Health spawns ambiently on a saucer-like timer
// and is instant; the other four (rapid/triple/magnet/engine) are timed effects that drop from
// small-tier Debris/Hunter kills. Same-type pickups refresh the timer (no magnitude stacking);
// different types run independently. Icons/labels/colors live with COLOR (below the helpers).
const POWERUP_DURATION = 15;        // sec a timed effect (rapid/triple/magnet/engine) stays active
const POWERUP_RADIUS = 15;          // pickup icon radius = its collision radius from ship center
const POWERUP_DECAY = 14;           // sec an uncollected powerup lingers before fading away
const POWERUP_DROP_CHANCE = 0.10;   // chance a small-tier kill drops a random weapon/utility powerup (8-12% band)
const POWERUP_DROP_TYPES = ["rapid", "triple", "magnet", "engine"]; // Health is ambient-only, never a drop
const POWERUP_HEALTH_GAP = [18, 26]; // sec between ambient Health spawns (saucer-like cadence)
const POWERUP_HEALTH_AMOUNT = 25;    // +HP on Health pickup, capped at max (matches the F2 milestone repair)
const POWERUP_HEALTH_MIN_DIST = 220; // ambient Health spawns in a ring this..MAX from the ship (reachable, visible)
const POWERUP_HEALTH_MAX_DIST = 520;
// Weapon caps. Triple's cap (12) is also the combined Rapid+Triple cap — the higher of the two,
// not the product (24), to keep bullet clutter from fighting Pillar 1 (vector clarity).
const RAPID_MAX_BULLETS  = 8;       // Rapid Fire bullet cap (2x base MAX_BULLETS)
const TRIPLE_MAX_BULLETS = 12;      // Triple Shot bullet cap (3x base) — also the higher-of combined cap
const TRIPLE_SPREAD = 0.14;         // rad between the 3 Triple Shot bullets (a narrow fan)
// Magnet: attraction force (reads better than a bigger invisible circle) + a modest pickup-radius bump.
const MAGNET_RANGE_MULT  = 3;       // garbage within this x GARBAGE_PICKUP is pulled toward the ship (~54 px)
const MAGNET_PICKUP_MULT = 1.6;     // effective pickup radius grows this much while the magnet is active
const MAGNET_PULL = 360;            // px/sec^2 attraction toward the ship inside the magnet range
const MAGNET_DAMP = 0.06;           // per-sec velocity damping inside range so the pull glides, not jitters
// Engine: lightens the effective towed mass so thrust/top-speed/tug (all fed by chainMass) ease.
const ENGINE_MASS_MULT = 0.5;       // Engine halves the effective towed-mass sum while active

// Controller / gamepad input (F7). The one tunable knob for controller *feel* — how far an analog
// stick must travel before it counts as a directional press. Button/axis index enums and the binding
// table itself live with the Input section (below); they're structural, not balance. Rebinding UI is F8.
const GP_DEADZONE = 0.25;           // |left-stick axis| must exceed this to register (matches F7 spec)

// ---------- Canvas / scaling ----------
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  const scale = Math.min(window.innerWidth / VIEW_W, window.innerHeight / VIEW_H);
  canvas.width = VIEW_W;
  canvas.height = VIEW_H;
  canvas.style.width = Math.floor(VIEW_W * scale) + "px";
  canvas.style.height = Math.floor(VIEW_H * scale) + "px";
}
window.addEventListener("resize", resize);
resize();

// ---------- Audio (Web Audio synth) ----------
const AudioSys = {
  ctx: null, thrustNode: null, thrustGain: null,
  saucerOsc: null, saucerGain: null,
  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
  },
  resume() { if (this.ctx && this.ctx.state === "suspended") this.ctx.resume(); },
  now() { return this.ctx ? this.ctx.currentTime : 0; },

  fire() {
    if (!this.ctx) return;
    const t = this.now();
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = "square";
    o.frequency.setValueAtTime(880, t);
    o.frequency.exponentialRampToValueAtTime(160, t + 0.12);
    g.gain.setValueAtTime(0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
    o.connect(g).connect(this.ctx.destination);
    o.start(t); o.stop(t + 0.15);
  },

  explosion(size) { // size 1..3, bigger = deeper/longer
    if (!this.ctx) return;
    const t = this.now();
    const dur = 0.25 + size * 0.15;
    const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * dur, this.ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 1.6);
    }
    const src = this.ctx.createBufferSource();
    src.buffer = buf;
    const filt = this.ctx.createBiquadFilter();
    filt.type = "lowpass";
    filt.frequency.setValueAtTime(900 - size * 180, t);
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.5, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    src.connect(filt).connect(g).connect(this.ctx.destination);
    src.start(t);
  },

  thrust(on) {
    if (!this.ctx) return;
    if (on && !this.thrustNode) {
      const dur = 1;
      const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * dur, this.ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      const src = this.ctx.createBufferSource();
      src.buffer = buf; src.loop = true;
      const filt = this.ctx.createBiquadFilter();
      filt.type = "lowpass"; filt.frequency.value = 320;
      const g = this.ctx.createGain();
      g.gain.value = 0.10;
      src.connect(filt).connect(g).connect(this.ctx.destination);
      src.start();
      this.thrustNode = src; this.thrustGain = g;
    } else if (!on && this.thrustNode) {
      this.thrustNode.stop();
      this.thrustNode = null; this.thrustGain = null;
    }
  },

  beat(high) {
    if (!this.ctx) return;
    const t = this.now();
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = "sine";
    o.frequency.value = high ? 110 : 82;
    g.gain.setValueAtTime(0.16, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    o.connect(g).connect(this.ctx.destination);
    o.start(t); o.stop(t + 0.13);
  },

  saucer(on, small) {
    if (!this.ctx) return;
    if (on && !this.saucerOsc) {
      const o = this.ctx.createOscillator();
      const lfo = this.ctx.createOscillator();
      const lfoGain = this.ctx.createGain();
      const g = this.ctx.createGain();
      o.type = "triangle";
      o.frequency.value = small ? 520 : 260;
      lfo.frequency.value = small ? 7 : 4;
      lfoGain.gain.value = small ? 90 : 45;
      lfo.connect(lfoGain).connect(o.frequency);
      g.gain.value = 0.055;
      o.connect(g).connect(this.ctx.destination);
      o.start(); lfo.start();
      this.saucerOsc = { o, lfo }; this.saucerGain = g;
    } else if (!on && this.saucerOsc) {
      this.saucerOsc.o.stop(); this.saucerOsc.lfo.stop();
      this.saucerOsc = null; this.saucerGain = null;
    }
  },

  shieldPing() {
    if (!this.ctx) return;
    const t = this.now();
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = "sine";
    o.frequency.setValueAtTime(1400, t);
    o.frequency.exponentialRampToValueAtTime(500, t + 0.18);
    g.gain.setValueAtTime(0.14, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    o.connect(g).connect(this.ctx.destination);
    o.start(t); o.stop(t + 0.21);
  },

  pickup() {
    if (!this.ctx) return;
    const t = this.now();
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = "sine";
    o.frequency.setValueAtTime(300, t);
    o.frequency.exponentialRampToValueAtTime(620, t + 0.08);
    g.gain.setValueAtTime(0.1, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    o.connect(g).connect(this.ctx.destination);
    o.start(t); o.stop(t + 0.13);
  },

  deliver(count) { // pitch climbs with each canister in a delivery run
    if (!this.ctx) return;
    const t = this.now();
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = "triangle";
    o.frequency.value = 440 * Math.pow(1.06, Math.min(count, 20));
    g.gain.setValueAtTime(0.13, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    o.connect(g).connect(this.ctx.destination);
    o.start(t); o.stop(t + 0.16);
  },

  hit() { // ship takes hull damage — a low, heavy descending thud (distinct from fire)
    if (!this.ctx) return;
    const t = this.now();
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = "square";
    o.frequency.setValueAtTime(200, t);
    o.frequency.exponentialRampToValueAtTime(55, t + 0.18);
    g.gain.setValueAtTime(0.2, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
    o.connect(g).connect(this.ctx.destination);
    o.start(t); o.stop(t + 0.23);
  },

  powerup() { // collected a powerup — a bright two-note rising "power on" chime (distinct from pickup)
    if (!this.ctx) return;
    const t = this.now();
    [660, 990].forEach((f, i) => {
      const o = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      o.type = "triangle";
      o.frequency.setValueAtTime(f, t + i * 0.07);
      const g0 = 0.12;
      g.gain.setValueAtTime(g0, t + i * 0.07);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.07 + 0.14);
      o.connect(g).connect(this.ctx.destination);
      o.start(t + i * 0.07); o.stop(t + i * 0.07 + 0.15);
    });
  }
};

// ---------- Input ----------
// One input layer serves both keyboard and gamepad. Everything downstream only ever calls
// input.left()/right()/thrust()/fire()/shield() — it never reads keys{} or the gamepad directly,
// so the two input methods stay swappable and Phase 8's rebinding UI has a single table to edit.

const keys = {};

// W3C "Standard Gamepad" button/axis layout (developer.mozilla.org/en-US/docs/Web/API/Gamepad).
// These are the physical hardware indices, not tunable balance — they name the binding table below.
const GP = {
  A: 0, B: 1, X: 2, Y: 3,          // face buttons
  LB: 4, RB: 5, LT: 6, RT: 7,      // shoulders / triggers
  BACK: 8, START: 9,               // center buttons
  LS: 10, RS: 11,                  // stick presses
  DPAD_UP: 12, DPAD_DOWN: 13, DPAD_LEFT: 14, DPAD_RIGHT: 15,
  AXIS_LX: 0, AXIS_LY: 1, AXIS_RX: 2, AXIS_RY: 3   // analog axis indices
};

// The binding table — the single source of truth for what triggers each action, as DATA (not
// per-action logic) so Phase 8 can render/rebind it directly. Each action lists the keyboard keys
// (lowercased, matching the keys{} map), the gamepad buttons, and optionally one analog axis
// (dir < 0 = negative half past the deadzone, dir > 0 = positive half). `fixed:true` marks the
// menu/system actions that F7 spec'd as non-rebindable (A confirm / B back / Start pause).
const bindings = {
  // Gameplay actions (held-state, polled every frame). Rebindable in Phase 8.
  left:    { label: "Rotate CCW", fixed: false, keys: ["arrowleft", "a"],  buttons: [GP.DPAD_LEFT],  axis: { index: GP.AXIS_LX, dir: -1 } },
  right:   { label: "Rotate CW",  fixed: false, keys: ["arrowright", "d"], buttons: [GP.DPAD_RIGHT], axis: { index: GP.AXIS_LX, dir: +1 } },
  thrust:  { label: "Thrust",     fixed: false, keys: ["arrowup", "w"],    buttons: [GP.DPAD_UP],    axis: { index: GP.AXIS_LY, dir: -1 } },
  fire:    { label: "Fire",       fixed: false, keys: [" "],               buttons: [GP.A] },
  shield:  { label: "Shield",     fixed: false, keys: ["shift"],           buttons: [GP.RT, GP.RB] }, // gap-fill: no controller shield was spec'd (see notes)
  // Menu / system actions (edge-triggered). Fixed per F7 — not exposed to rebinding.
  confirm: { label: "Confirm",    fixed: true,  keys: ["enter"],           buttons: [GP.A] },
  back:    { label: "Back",       fixed: true,  keys: ["escape"],          buttons: [GP.B] },     // reserved for F8 menu screens; no target yet
  pause:   { label: "Pause",      fixed: true,  keys: ["p"],               buttons: [GP.START] }
};

// Snapshot of the first connected gamepad, refreshed once per frame by pollGamepad() (main loop,
// before update()). buttons/axes are the current frame; prevButtons is last frame, for edge detection.
const gamepad = { connected: false, buttons: [], axes: [], prevButtons: [] };

function pollGamepad() {
  const pads = (navigator.getGamepads && navigator.getGamepads()) || [];
  let pad = null;
  for (const p of pads) { if (p) { pad = p; break; } }   // first connected only; ignore the rest (F7)
  gamepad.prevButtons = gamepad.buttons;                 // keep last frame's booleans for edge detection
  if (!pad) { gamepad.connected = false; gamepad.buttons = []; gamepad.axes = []; return; }
  gamepad.connected = true;
  // GamepadButton objects expose .pressed; some environments hand back raw numbers — support both.
  gamepad.buttons = pad.buttons.map(b => (b && typeof b === "object") ? b.pressed : b > 0.5);
  gamepad.axes = pad.axes.slice();
}

// --- Binding resolution (shared by held-state predicates and edge-triggered menu reads) ---
function kbActive(b) {              // any bound keyboard key currently down?
  for (const k of b.keys) if (keys[k]) return true;
  return false;
}
function gpActive(b) {              // any bound gamepad button held, or the bound axis past its deadzone?
  if (!gamepad.connected) return false;
  if (b.buttons) for (const i of b.buttons) if (gamepad.buttons[i]) return true;
  if (b.axis) {
    const v = gamepad.axes[b.axis.index];
    if (v !== undefined && (b.axis.dir < 0 ? v < -GP_DEADZONE : v > GP_DEADZONE)) return true;
  }
  return false;
}
function actionHeld(name) {         // held-state: keyboard OR gamepad, for the gameplay predicates
  const b = bindings[name];
  return kbActive(b) || gpActive(b);
}
function gpPressed(b) {             // gamepad edge: a bound button newly pressed THIS frame (not held)
  if (!gamepad.connected || !b.buttons) return false;
  for (const i of b.buttons) if (gamepad.buttons[i] && !gamepad.prevButtons[i]) return true;
  return false;
}

// The predicate object the rest of the game reads — call signature unchanged from before F7.
const input = {
  left:   () => actionHeld("left"),
  right:  () => actionHeld("right"),
  thrust: () => actionHeld("thrust"),
  fire:   () => actionHeld("fire"),
  shield: () => actionHeld("shield")
};

// Keyboard edge events (menu/system). The key checks read the SAME binding table as the gamepad path,
// so there's one place to change what "confirm" or "pause" means. Held-state gameplay keys are just
// recorded into keys{} here and read later via input.*().
window.addEventListener("keydown", e => {
  if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault();
  const k = e.key.toLowerCase();
  keys[k] = true;
  AudioSys.init(); AudioSys.resume();
  if (bindings.confirm.keys.includes(k) && (game.state === "title" || game.state === "gameover")) startGame();
  if (bindings.pause.keys.includes(k) && game.state === "playing") game.paused = !game.paused;
});
window.addEventListener("keyup", e => { keys[e.key.toLowerCase()] = false; });

// Gamepad edge events (menu/system), mirroring the keydown handler. Called once per frame from the
// main loop right after pollGamepad(). Start = start/pause/unpause; A = confirm (title/gameover only,
// so it never collides with A = fire during play); B = back is reserved for the F8 menu screens.
function handleGamepadMenu() {
  const pressedStart   = gpPressed(bindings.pause);
  const pressedConfirm = gpPressed(bindings.confirm);
  if (pressedStart || pressedConfirm) { AudioSys.init(); AudioSys.resume(); } // best-effort audio unlock
  if (pressedStart) {
    if (game.state === "title" || game.state === "gameover") startGame();
    else if (game.state === "playing") game.paused = !game.paused;
  }
  if (pressedConfirm && (game.state === "title" || game.state === "gameover")) startGame();
  // gpPressed(bindings.back) — no menu screen to back out of yet (arrives with F8/Phase 8).
}

// ---------- Helpers ----------
const rand = (a, b) => a + Math.random() * (b - a);
const randSign = () => Math.random() < 0.5 ? -1 : 1;

// Global difficulty ramp (F10). Returns 0 at wave 1 and climbs asymptotically toward 1
// over many waves — the single curve every wave-driven threat parameter scales off.
// RAMP_WAVES sets how fast the whole game gets hard; this is the one knob to turn.
function difficultyFactor(wave) {
  return 1 - Math.exp(-(wave - 1) / RAMP_WAVES);
}
// Interpolate a threat parameter between its easy wave-1 floor and its full-intensity
// ceiling using the difficulty curve. Every early-game pacing value flows through this.
function ramp(floor, ceil, wave) {
  return floor + (ceil - floor) * difficultyFactor(wave);
}

function wrap(obj) {
  if (obj.x < -60) obj.x += WORLD_W + 120;
  if (obj.x > WORLD_W + 60) obj.x -= WORLD_W + 120;
  if (obj.y < -60) obj.y += WORLD_H + 120;
  if (obj.y > WORLD_H + 60) obj.y -= WORLD_H + 120;
}

function dist2(a, b) {
  // shortest distance squared on a wrapping field
  let dx = Math.abs(a.x - b.x); if (dx > WORLD_W / 2) dx = WORLD_W - dx;
  let dy = Math.abs(a.y - b.y); if (dy > WORLD_H / 2) dy = WORLD_H - dy;
  return dx * dx + dy * dy;
}

function angleTo(from, to) {
  let dx = to.x - from.x, dy = to.y - from.y;
  if (dx > WORLD_W / 2) dx -= WORLD_W; if (dx < -WORLD_W / 2) dx += WORLD_W;
  if (dy > WORLD_H / 2) dy -= WORLD_H; if (dy < -WORLD_H / 2) dy += WORLD_H;
  return Math.atan2(dy, dx);
}

function shortDelta(ax, ay, bx, by) {
  // shortest vector from a to b on the wrapping field
  let dx = bx - ax, dy = by - ay;
  if (dx > WORLD_W / 2) dx -= WORLD_W; if (dx < -WORLD_W / 2) dx += WORLD_W;
  if (dy > WORLD_H / 2) dy -= WORLD_H; if (dy < -WORLD_H / 2) dy += WORLD_H;
  return [dx, dy];
}

// Nearest wrapped image offset of a world coord relative to a reference (camera).
function wrapOffset(coord, refCoord, size) {
  const d = coord - refCoord;
  if (d > size / 2) return -size;
  if (d < -size / 2) return size;
  return 0;
}

// Fold a world position into [0,WORLD) — used when placing freshly spawned entities.
function wrapPos(p) {
  p.x = ((p.x % WORLD_W) + WORLD_W) % WORLD_W;
  p.y = ((p.y % WORLD_H) + WORLD_H) % WORLD_H;
  return p;
}

// Vector-glow stroke
function glowStroke(color, width = 1.6, blur = 10) {
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.shadowColor = color;
  ctx.shadowBlur = blur;
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function drawPoly(points, x, y, angle, color, closed = true) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.moveTo(points[0][0], points[0][1]);
  for (let i = 1; i < points.length; i++) ctx.lineTo(points[i][0], points[i][1]);
  if (closed) ctx.closePath();
  glowStroke(color);
  ctx.restore();
}

const COLOR = {
  ship: "#9fd8ff",
  bullet: "#ffffff",
  debris: "#7fb7e8",
  saucer: "#b8e6ff",
  satellite: "#6fe8d8",
  wedge: "#5fffc8",
  shield: "#40b0ff",
  text: "#a8d4ff",
  dim: "#3a5a80",
  garbage: "#c8ff50",
  garbageLight: "#b8ffb0",   // low-mass Hunter scrap: a paler, mintier tint so it reads as "lighter / easier to tow" (F4)
  chain: "#8aa0ff",
  dock: "#70ffa0",
  hp: "#5fe08a"
};

// Per-type powerup identity (F6): a distinct glow color + a short HUD label per kind. Health
// keeps the universal red-cross red; the rest are hued apart for a readable at-a-glance tell.
const POWERUP_COLOR = {
  rapid:  "#ffd24a",   // Rapid Fire — amber
  triple: "#ff8adf",   // Triple Shot — magenta
  health: "#ff6b6b",   // Health — red (cross)
  magnet: "#8ab6ff",   // Magnet — blue
  engine: "#7dffb0"    // Engine — mint green
};
const POWERUP_LABEL = {
  rapid: "RAPID", triple: "TRIPLE", health: "+HP", magnet: "MAGNET", engine: "ENGINE"
};

// ---------- Entities ----------
class Ship {
  constructor() { this.reset(); }
  reset() {
    this.x = WORLD_W / 2; this.y = WORLD_H / 2;
    this.vx = 0; this.vy = 0;
    this.angle = -Math.PI / 2;
    this.cooldown = 0;
    this.dead = false;
    this.hp = SHIP_MAX_HP;  // one hull pool for the whole run (F2)
    this.invuln = 0;        // hit-stun i-frames; set on each non-lethal hit (drives the blink)
    this.shieldOn = false;
    this.energy = 1;        // 0..1
    this.thrusting = false;
  }
  update(dt) {
    if (this.dead) return;
    if (input.left())  this.angle -= SHIP_TURN * dt;
    if (input.right()) this.angle += SHIP_TURN * dt;

    this.thrusting = input.thrust();
    // towed cargo makes the ship heavier: weaker thrust, lower top speed. Scales with
    // the chain's total mass, not its node count (F5) — all-mass-1.0 cargo behaves
    // exactly as the old length-based penalty did.
    const cargo = chainMass();
    const thrustMul = 1 / (1 + cargo * CARGO_THRUST);
    const maxSp = SHIP_MAX_SPEED / (1 + cargo * CARGO_MAXSPD);
    if (this.thrusting) {
      this.vx += Math.cos(this.angle) * SHIP_THRUST * thrustMul * dt;
      this.vy += Math.sin(this.angle) * SHIP_THRUST * thrustMul * dt;
      const sp = Math.hypot(this.vx, this.vy);
      if (sp > maxSp) {
        this.vx *= maxSp / sp;
        this.vy *= maxSp / sp;
      }
    }
    AudioSys.thrust(this.thrusting && game.state === "playing" && !game.paused);

    const drag = Math.pow(1 - SHIP_DRAG, dt);
    this.vx *= drag; this.vy *= drag;
    this.x += this.vx * dt; this.y += this.vy * dt;
    wrap(this);

    // Shield
    if (input.shield() && this.energy > 0.02) {
      this.shieldOn = true;
      this.energy = Math.max(0, this.energy - SHIELD_DRAIN * dt);
      if (this.energy <= 0.02) this.shieldOn = false;
    } else {
      this.shieldOn = false;
      this.energy = Math.min(1, this.energy + SHIELD_RECHARGE * dt);
    }

    // Fire. The bullet cap flexes with the weapon powerups (F6): Rapid Fire raises it to
    // RAPID_MAX_BULLETS, Triple Shot to TRIPLE_MAX_BULLETS and fires a 3-bullet spread; both
    // active uses the higher (Triple) cap, not the product (see maxBullets()).
    this.cooldown -= dt;
    if (input.fire() && this.cooldown <= 0 &&
        game.bullets.filter(b => !b.hostile).length < maxBullets()) {
      const shoot = a => game.bullets.push(new Bullet(
        this.x + Math.cos(a) * SHIP_RADIUS, this.y + Math.sin(a) * SHIP_RADIUS,
        this.vx + Math.cos(a) * BULLET_SPEED, this.vy + Math.sin(a) * BULLET_SPEED, false));
      if (game.powerFx.triple > 0) {
        shoot(this.angle - TRIPLE_SPREAD); shoot(this.angle); shoot(this.angle + TRIPLE_SPREAD);
      } else {
        shoot(this.angle);
      }
      this.cooldown = FIRE_COOLDOWN;
      AudioSys.fire();
    }

    if (this.invuln > 0) this.invuln -= dt;
  }
  draw() {
    if (this.dead) return;
    const blink = this.invuln > 0 && Math.floor(this.invuln * 10) % 2 === 0;
    if (!blink) {
      const pts = [[16, 0], [-11, -9], [-6, 0], [-11, 9]];
      drawPoly(pts, this.x, this.y, this.angle, COLOR.ship);
      if (this.thrusting && Math.random() < 0.8) {
        const flame = [[-7, -4], [-15 - Math.random() * 6, 0], [-7, 4]];
        drawPoly(flame, this.x, this.y, this.angle, "#ffb060", false);
      }
    }
    if (this.shieldOn) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, SHIELD_RADIUS, 0, TAU);
      ctx.globalAlpha = 0.5 + Math.random() * 0.4;
      glowStroke(COLOR.shield, 2, 14);
      ctx.globalAlpha = 1;
    }
  }
}

class Bullet {
  constructor(x, y, vx, vy, hostile) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.life = hostile ? 1.4 : BULLET_LIFE;
    this.hostile = hostile;
    this.dead = false;
  }
  update(dt) {
    this.x += this.vx * dt; this.y += this.vy * dt;
    wrap(this);
    this.life -= dt;
    if (this.life <= 0) this.dead = true;
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, 2, 0, TAU);
    ctx.fillStyle = this.hostile ? "#ff9090" : COLOR.bullet;
    ctx.shadowColor = ctx.fillStyle;
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

// Debris Satellite (F3): the passive main hazard (formerly Asteroid). Drifts randomly
// like the old rocks, but reads as wrecked hardware — a broken-satellite silhouette —
// and splits 3-ways at the large/medium tiers, emitting garbage at every tier.
class DebrisSatellite {
  constructor(x, y, size, speedMul = 1) {
    this.x = x; this.y = y;
    this.size = size;
    this.radius = DEBRIS_RADII[size];
    this.damage = DEBRIS_DAMAGE[size];   // contact damage to the ship (F2)
    const sp = DEBRIS_SPEEDS[size] * speedMul * rand(0.7, 1.3);
    const a = rand(0, TAU);
    this.vx = Math.cos(a) * sp;
    this.vy = Math.sin(a) * sp;
    this.angle = rand(0, TAU);
    this.spin = rand(-1.2, 1.2);
    this.dead = false;
    // Broken-satellite silhouette: an irregular hull polygon (a bit blockier than a
    // rock) plus 1-2 protruding antenna/panel shards, drawn as open polylines.
    this.hull = [];
    const n = 6 + size;                 // large 9 / medium 8 / small 7 vertices
    for (let i = 0; i < n; i++) {
      const th = (i / n) * TAU;
      const r = this.radius * rand(0.65, 1.05);
      this.hull.push([Math.cos(th) * r, Math.sin(th) * r]);
    }
    this.shards = [];
    const antennas = 1 + (Math.random() < 0.6 ? 1 : 0);  // 1-2 protruding shards
    for (let k = 0; k < antennas; k++) {
      const th = rand(0, TAU);
      const base = [Math.cos(th) * this.radius * 0.8, Math.sin(th) * this.radius * 0.8];
      const rTip = this.radius * rand(1.35, 1.75);
      const tip  = [Math.cos(th) * rTip, Math.sin(th) * rTip];
      this.shards.push([base, tip]);                     // antenna stalk
      const perp = th + Math.PI / 2, cross = this.radius * 0.22;
      this.shards.push([                                 // dish/panel crossbar at the tip
        [tip[0] + Math.cos(perp) * cross, tip[1] + Math.sin(perp) * cross],
        [tip[0] - Math.cos(perp) * cross, tip[1] - Math.sin(perp) * cross]
      ]);
    }
  }
  update(dt) {
    this.x += this.vx * dt; this.y += this.vy * dt;
    this.angle += this.spin * dt;
    wrap(this);
  }
  draw() {
    drawPoly(this.hull, this.x, this.y, this.angle, COLOR.debris);
    for (const s of this.shards) drawPoly(s, this.x, this.y, this.angle, COLOR.debris, false);
  }
}

// Hunter Satellite (F4): the reshaped killer-satellite/wedge system. A diamond core drifts
// passively toward the ship (like the old Satellite); when shot it splits 3-ways into
// actively-homing children — medium then small, each faster and more agile than the last
// (like the old Wedge). Every tier emits garbage; the final small tier drops a larger burst
// of LOW-mass scrap. All speeds/turn rates scale from a gentle wave-1 floor up to their
// ceilings via the difficulty ramp (§2.13), so early waves are calm and full pressure
// arrives ~wave 20. Tiers use the Debris 3/2/1 convention: 3 large, 2 medium, 1 small.
class HunterSatellite {
  constructor(x, y, size, scatterAngle = 0) {
    this.x = x; this.y = y;
    this.size = size;                       // 3 large (core) / 2 medium / 1 small
    this.radius = HUNTER_RADII[size];
    this.damage = HUNTER_DAMAGE[size];      // contact damage to the ship (F2/F4)
    this.dead = false;
    // Wave-scaled from a gentle floor (HUNTER_FLOOR_FRAC × ceiling) up to the full ceiling.
    // game.wave is fixed for a Hunter's lifetime (Hunters block wave-clear), so sample once.
    this.speed    = ramp(HUNTER_SPEED_CEIL[size] * HUNTER_FLOOR_FRAC, HUNTER_SPEED_CEIL[size], game.wave);
    this.turnRate = ramp(HUNTER_TURN_CEIL[size]  * HUNTER_FLOOR_FRAC, HUNTER_TURN_CEIL[size],  game.wave);
    if (size === 3) {
      // Large core: passive drift toward the ship's position AT SPAWN — no continuous re-aim
      // (confirmed design). Only its drift *speed* scales with difficulty, not its behavior.
      this.homing = false;
      this.heading = angleTo(this, game.ship) + rand(-0.4, 0.4);
      this.angle = rand(0, TAU);
      this.spinRate = rand(0.6, 1.0) * randSign();  // slow visual tumble (reads as "not aiming at you")
    } else {
      // Medium/small: relentless wrap-aware homing after a brief outward scatter.
      this.homing = true;
      this.heading = scatterAngle;
      this.scatter = HUNTER_SCATTER;
    }
    this.vx = Math.cos(this.heading) * this.speed;
    this.vy = Math.sin(this.heading) * this.speed;
    // Diamond silhouette, scaled per tier. The large core is a symmetric diamond that spins
    // in place; homers are a forward-elongated kite-diamond that points along the pursuit
    // heading (reads as "aiming at you"). Inner diamond on the two larger tiers for presence.
    const r = this.radius;
    this.shape = this.homing
      ? [[r * 1.35, 0], [0, -r * 0.8], [-r * 0.75, 0], [0, r * 0.8]]
      : [[r, 0], [0, -r], [-r, 0], [0, r]];
    this.inner = size >= 2
      ? [[r * 0.5, 0], [0, -r * 0.4], [-r * 0.4, 0], [0, r * 0.4]]
      : null;
  }
  // Spawn a fresh large core from just beyond a random viewport edge, relative to the ship,
  // so it still slides in from off-screen and drifts toward the ship (feel unchanged from
  // the old Satellite). Children are created directly at the parent's position in destroyHunter.
  static spawnCore() {
    const edge = Math.floor(rand(0, 4));
    const p = { x: game.ship.x, y: game.ship.y };
    if (edge === 0)      { p.x -= VIEW_W / 2 + 40; p.y += rand(-VIEW_H / 2, VIEW_H / 2); }
    else if (edge === 1) { p.x += VIEW_W / 2 + 40; p.y += rand(-VIEW_H / 2, VIEW_H / 2); }
    else if (edge === 2) { p.y -= VIEW_H / 2 + 40; p.x += rand(-VIEW_W / 2, VIEW_W / 2); }
    else                 { p.y += VIEW_H / 2 + 40; p.x += rand(-VIEW_W / 2, VIEW_W / 2); }
    wrapPos(p);
    return new HunterSatellite(p.x, p.y, 3);
  }
  update(dt) {
    if (this.homing) {
      if (this.scatter > 0) {
        this.scatter -= dt;
      } else if (!game.ship.dead) {
        const target = angleTo(this, game.ship);
        let diff = target - this.heading;
        while (diff > Math.PI) diff -= TAU;
        while (diff < -Math.PI) diff += TAU;
        const maxTurn = this.turnRate * dt;
        this.heading += Math.max(-maxTurn, Math.min(maxTurn, diff));
      }
      this.vx = Math.cos(this.heading) * this.speed;
      this.vy = Math.sin(this.heading) * this.speed;
    } else {
      this.angle += this.spinRate * dt;   // large core tumbles; keeps its fixed spawn-time drift velocity
    }
    this.x += this.vx * dt; this.y += this.vy * dt;
    wrap(this);
  }
  draw() {
    const ang = this.homing ? this.heading : this.angle;
    drawPoly(this.shape, this.x, this.y, ang, COLOR.satellite);
    if (this.inner) {
      // homers: inner tracks the nose; core: counter-rotate for a faceted shimmer
      drawPoly(this.inner, this.x, this.y, this.homing ? ang : -this.angle * 1.5, COLOR.satellite);
    }
  }
}

class Saucer {
  constructor(small) {
    this.small = small;
    this.radius = small ? 12 : 20;
    this.damage = small ? DMG_SMALL : DMG_MEDIUM;   // ramming contact damage to the ship (F2)
    this.fromLeft = Math.random() < 0.5;
    // enter from just beyond the left/right viewport edge, relative to the ship
    const p = wrapPos({
      x: game.ship.x + (this.fromLeft ? -(VIEW_W / 2 + 40) : VIEW_W / 2 + 40),
      y: game.ship.y + rand(-VIEW_H * 0.35, VIEW_H * 0.35)
    });
    this.x = p.x; this.y = p.y;
    this.baseY = this.y;   // vertical zig-zag stays in a band around the entry height
    this.vx = (this.fromLeft ? 1 : -1) * (small ? 150 : 100);
    this.vy = 0;
    this.dead = false;
    this.fireTimer = this.rollFireTimer(SAUCER_FIRE_INIT);   // first shot delayed harder at low waves (F10)
    this.zigTimer = rand(0.8, 1.8);
    this.travel = 0;
  }
  // Between-shot / first-shot delay for a [min,max] base range, slowed by the F10 fire
  // multiplier: ~1.8× the shipped interval at wave 1, easing to 1.0× at full difficulty.
  rollFireTimer(range) {
    const mult = ramp(SAUCER_FIRE_MULT_FLOOR, SAUCER_FIRE_MULT_CEIL, game.wave);
    return rand(range[0], range[1]) * mult;
  }
  update(dt) {
    this.zigTimer -= dt;
    if (this.zigTimer <= 0) {
      this.vy = randSign() * rand(40, 110);
      this.zigTimer = rand(0.8, 1.8);
    }
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    // keep the zig-zag within a screen-height band around the entry height
    if (this.y < this.baseY - (VIEW_H / 2 - 30) || this.y > this.baseY + (VIEW_H / 2 - 30)) this.vy *= -1;
    this.travel += Math.abs(this.vx) * dt;
    if (this.travel > VIEW_W + 120) { this.dead = true; return; } // exits, no wrap-x

    this.fireTimer -= dt;
    if (this.fireTimer <= 0 && !game.ship.dead) {
      let a;
      if (this.small) {
        // aimed, but the error widens toward a barely-aimed spray at low waves (F10)
        const err = ramp(SAUCER_AIM_ERR_FLOOR, SAUCER_AIM_ERR_CEIL, game.wave);
        a = angleTo(this, game.ship) + rand(-err, err);
      } else {
        a = rand(0, TAU); // random
      }
      game.bullets.push(new Bullet(this.x, this.y,
        Math.cos(a) * 380, Math.sin(a) * 380, true));
      this.fireTimer = this.rollFireTimer(this.small ? SAUCER_FIRE_SMALL : SAUCER_FIRE_BIG);
    }
  }
  draw() {
    const s = this.small ? 0.62 : 1;
    const body = [[-20*s,4*s],[-9*s,-4*s],[9*s,-4*s],[20*s,4*s],[9*s,11*s],[-9*s,11*s]];
    const dome = [[-9*s,-4*s],[-5*s,-11*s],[5*s,-11*s],[9*s,-4*s]];
    drawPoly(body, this.x, this.y, 0, COLOR.saucer);
    drawPoly(dome, this.x, this.y, 0, COLOR.saucer, false);
    // middle line
    ctx.beginPath();
    ctx.moveTo(this.x - 20*s, this.y + 4*s);
    ctx.lineTo(this.x + 20*s, this.y + 4*s);
    glowStroke(COLOR.saucer);
  }
}

class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    const a = rand(0, TAU), sp = rand(30, 240);
    this.vx = Math.cos(a) * sp; this.vy = Math.sin(a) * sp;
    this.life = rand(0.3, 0.9);
    this.maxLife = this.life;
    this.color = color;
    this.dead = false;
  }
  update(dt) {
    this.x += this.vx * dt; this.y += this.vy * dt;
    this.life -= dt;
    if (this.life <= 0) this.dead = true;
  }
  draw() {
    ctx.globalAlpha = this.life / this.maxLife;
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x - 1, this.y - 1, 2, 2);
    ctx.globalAlpha = 1;
  }
}

// Shared renderer for radioactive canisters (free-floating and chained). Low-mass scrap
// (Hunter small-tier drops) renders in a paler tint so it's visibly the easier-to-tow bonus.
function drawCanister(x, y, angle, alpha, color = COLOR.garbage) {
  ctx.globalAlpha = alpha * (0.75 + Math.random() * 0.25); // radioactive flicker
  const body = [[7, -5], [7, 5], [-7, 5], [-7, -5]];
  drawPoly(body, x, y, angle, color);
  ctx.save();
  ctx.translate(x, y); ctx.rotate(angle);
  ctx.beginPath(); ctx.moveTo(-7, 0); ctx.lineTo(7, 0); // hazard stripe
  glowStroke(color, 1, 5);
  ctx.restore();
  ctx.globalAlpha = 1;
}

class Garbage {
  constructor(x, y, vx = 0, vy = 0, decay = GARBAGE_DECAY, mass = 1.0) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.spin = rand(0, TAU);
    this.spinRate = rand(-1.5, 1.5);
    this.decay = decay;
    this.mass = mass;   // towing weight (F5): 1.0 for Debris scrap; lighter scrap tows easier
    this.radius = 7;
    this.dead = false;
  }
  static fromNode(n, decay = GARBAGE_SEVER_DECAY) { // chain node knocked loose -> free garbage
    const a = rand(0, TAU);
    return new Garbage(n.x, n.y,
      Math.cos(a) * rand(20, 60), Math.sin(a) * rand(20, 60), decay, n.mass);
  }
  update(dt) {
    this.x += this.vx * dt; this.y += this.vy * dt;
    this.spin += this.spinRate * dt;
    wrap(this);
    this.decay -= dt;
    if (this.decay <= 0) this.dead = true;
  }
  draw() {
    // blink faster as decay approaches
    const blink = this.decay < 5 &&
      Math.floor(this.decay * (this.decay < 2 ? 8 : 4)) % 2 === 0;
    if (!blink) drawCanister(this.x, this.y, this.spin, 0.9,
      this.mass < 1 ? COLOR.garbageLight : COLOR.garbage);
  }
}

// Draw a powerup's type glyph centered at (x,y), scaled to icon radius r, in `color`.
// Reused by the field entity (with a housing ring) and the HUD active-effect row (bare glyph),
// so a powerup reads identically in the world and on the HUD. Local-space icons designed at r=12.
function drawPowerupGlyph(type, x, y, r, color) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(r / 12, r / 12);
  ctx.beginPath();
  switch (type) {
    case "rapid":  // fast-forward: two right-pointing chevrons
      ctx.moveTo(-6, -6); ctx.lineTo(0, 0); ctx.lineTo(-6, 6);
      ctx.moveTo(1, -6);  ctx.lineTo(7, 0); ctx.lineTo(1, 6);
      break;
    case "triple": // a 3-way spread fan from a single origin
      ctx.moveTo(-7, 0); ctx.lineTo(7, -7);
      ctx.moveTo(-7, 0); ctx.lineTo(8, 0);
      ctx.moveTo(-7, 0); ctx.lineTo(7, 7);
      break;
    case "health": // plus / medical cross
      ctx.moveTo(0, -8); ctx.lineTo(0, 8);
      ctx.moveTo(-8, 0); ctx.lineTo(8, 0);
      break;
    case "magnet": // horseshoe magnet opening up, with pole tips
      ctx.arc(0, 1, 5, 0, Math.PI);
      ctx.moveTo(-5, 1); ctx.lineTo(-5, -7);
      ctx.moveTo(5, 1);  ctx.lineTo(5, -7);
      ctx.moveTo(-7, -7); ctx.lineTo(-3, -7);
      ctx.moveTo(3, -7);  ctx.lineTo(7, -7);
      break;
    case "engine": // thruster bell firing exhaust
      ctx.moveTo(-4, -8); ctx.lineTo(4, -8); ctx.lineTo(6, 2); ctx.lineTo(-6, 2); ctx.closePath();
      ctx.moveTo(-4, 3); ctx.lineTo(-3, 8);
      ctx.moveTo(0, 3);  ctx.lineTo(0, 9);
      ctx.moveTo(4, 3);  ctx.lineTo(3, 8);
      break;
  }
  glowStroke(color, 1.6, 8);
  ctx.restore();
}

// Powerup (F6): a free-floating pickup following the standard entity contract. A rotating
// hexagon housing (so every kind reads as one "collect me" family) wraps a distinct per-type
// glyph. Health spawns ambiently and is instant; rapid/triple/magnet/engine are timed drops.
// Uncollected powerups fade after POWERUP_DECAY with the same blink countdown as garbage.
class Powerup {
  constructor(x, y, type, vx = 0, vy = 0) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.type = type;
    this.radius = POWERUP_RADIUS;
    this.spin = rand(0, TAU);
    this.spinRate = rand(-0.8, 0.8);
    this.pulse = rand(0, TAU);
    this.decay = POWERUP_DECAY;
    this.dead = false;
  }
  update(dt) {
    this.x += this.vx * dt; this.y += this.vy * dt;
    this.vx *= Math.pow(0.4, dt); this.vy *= Math.pow(0.4, dt); // drop kick settles quickly
    this.spin += this.spinRate * dt;
    this.pulse += dt * 4;
    wrap(this);
    this.decay -= dt;
    if (this.decay <= 0) this.dead = true;
  }
  draw() {
    const blink = this.decay < 4 && Math.floor(this.decay * (this.decay < 2 ? 8 : 4)) % 2 === 0;
    if (blink) return;
    const color = POWERUP_COLOR[this.type];
    const r = this.radius;
    const hex = [];
    for (let i = 0; i < 6; i++) { const th = (i / 6) * TAU; hex.push([Math.cos(th) * r, Math.sin(th) * r]); }
    ctx.globalAlpha = 0.75 + 0.25 * Math.sin(this.pulse);
    drawPoly(hex, this.x, this.y, this.spin, color);
    ctx.globalAlpha = 1;
    drawPowerupGlyph(this.type, this.x, this.y, r * 0.62, color);
  }
}

class FloatText {
  constructor(text, x, y, color) {
    this.text = text; this.x = x; this.y = y; this.color = color;
    this.life = 1.1; this.dead = false;
  }
  update(dt) {
    this.y -= 30 * dt;
    this.life -= dt;
    if (this.life <= 0) this.dead = true;
  }
  draw() {
    ctx.globalAlpha = Math.max(0, this.life / 1.1);
    drawText(this.text, this.x, this.y, 16, this.color);
    ctx.globalAlpha = 1;
  }
}

class Dock {
  constructor() {
    // place within reach of the ship's current world position, but not on top of it
    const a = rand(0, TAU);
    const d = rand(DOCK_MIN_DIST, DOCK_MAX_DIST);
    const p = wrapPos({ x: game.ship.x + Math.cos(a) * d, y: game.ship.y + Math.sin(a) * d });
    this.x = p.x; this.y = p.y;
    this.radius = DOCK_RADIUS;
    this.spin = 0;
    this.pts = [];
    for (let i = 0; i < 8; i++) {
      const th = (i / 8) * TAU + TAU / 16;
      this.pts.push([Math.cos(th) * DOCK_RADIUS, Math.sin(th) * DOCK_RADIUS]);
    }
  }
  update(dt) { this.spin += dt * 0.7; }
  draw() {
    drawPoly(this.pts, this.x, this.y, 0, COLOR.dock);
    // rotating intake vanes
    for (let i = 0; i < 3; i++) {
      const th = this.spin + (i * TAU) / 3;
      ctx.beginPath();
      ctx.moveTo(this.x + Math.cos(th) * (DOCK_RADIUS - 10),
                 this.y + Math.sin(th) * (DOCK_RADIUS - 10));
      ctx.lineTo(this.x + Math.cos(th + 0.25) * 14,
                 this.y + Math.sin(th + 0.25) * 14);
      glowStroke(COLOR.dock, 1.4, 8);
    }
    const hot = game.chain.length > 0 && Math.floor(performance.now() / 350) % 2 === 0;
    drawText("RECYCLE", this.x, this.y + DOCK_RADIUS + 22, 14,
      hot ? COLOR.garbage : COLOR.dim);
  }
}

// ---------- Game state ----------
const game = {
  state: "title",   // title | playing | gameover
  paused: false,
  ship: new Ship(),
  camera: { x: WORLD_W / 2, y: WORLD_H / 2 }, // world point at the center of the viewport
  debris: [], bullets: [], saucers: [], hunters: [], particles: [],
  garbage: [], chain: [], floaters: [], dock: null,
  powerups: [],                                        // free-floating Powerup pickups (F6)
  powerFx: { rapid: 0, triple: 0, magnet: 0, engine: 0 }, // remaining sec per timed effect (0 = inactive)
  healthTimer: 0,                                      // countdown to the next ambient Health spawn
  deliveryCount: 0, offloadTimer: 0,
  score: 0, wave: 0,
  nextRepair: REPAIR_MILESTONE,   // next score threshold that repairs the hull (F2)
  saucerTimer: 0,
  hunterTimer: 0,
  beatTimer: 0, beatHigh: false, beatInterval: 1.0,
  waveClearTimer: 0
};

function startGame() {
  game.state = "playing";
  game.paused = false;
  game.score = 0;
  game.wave = 0;
  game.nextRepair = REPAIR_MILESTONE;
  game.debris = []; game.bullets = []; game.saucers = [];
  game.hunters = []; game.particles = [];
  game.garbage = []; game.chain = []; game.floaters = [];
  game.powerups = [];
  game.powerFx = { rapid: 0, triple: 0, magnet: 0, engine: 0 };
  game.healthTimer = rand(POWERUP_HEALTH_GAP[0], POWERUP_HEALTH_GAP[1]);
  game.deliveryCount = 0; game.offloadTimer = 0;
  game.ship = new Ship();
  game.camera = { x: game.ship.x, y: game.ship.y };
  game.saucerTimer = rand(SAUCER_GAP_FLOOR_MIN, SAUCER_GAP_FLOOR_MAX); // first saucer waits the wave-1 floor gap (F10)
  game.hunterTimer = rand(14, 22);
  nextWave();
}

function nextWave() {
  game.wave++;
  game.dock = new Dock(); // recycling dock relocates each wave
  // F3 first-pass balance: trimmed from min(4+wave, 11) to offset the ~8x higher garbage
  // volume from guaranteed 3-per-tier drops. Decay (GARBAGE_DECAY) is the primary density
  // lever; this is the secondary trim. F10 may push this back up for a fuller field.
  const count = Math.min(3 + game.wave, 9);
  const speedMul = 1 + (game.wave - 1) * 0.08;
  for (let i = 0; i < count; i++) {
    // spawn in a ring around the ship's current world position so the wave is
    // reachable (min distance keeps it off the ship, max keeps it from being
    // stranded on the far side of the big world)
    const a = rand(0, TAU);
    const d = rand(SPAWN_MIN_DIST, SPAWN_MAX_DIST);
    const p = wrapPos({ x: game.ship.x + Math.cos(a) * d, y: game.ship.y + Math.sin(a) * d });
    game.debris.push(new DebrisSatellite(p.x, p.y, 3, speedMul));
  }
}

function addScore(pts) {
  game.score += pts;
  // Score milestones repair the hull instead of granting an extra life (F2).
  if (game.score >= game.nextRepair) {
    game.nextRepair += REPAIR_MILESTONE;
    if (game.ship.hp < SHIP_MAX_HP) {
      game.ship.hp = Math.min(SHIP_MAX_HP, game.ship.hp + REPAIR_AMOUNT);
    } else {
      game.score += REPAIR_FULL_BONUS; // already at full HP: cash the milestone in as points
    }
    AudioSys.shieldPing();
  }
}

function boom(x, y, size, color) {
  const n = 6 + size * 6;
  for (let i = 0; i < n; i++) game.particles.push(new Particle(x, y, color));
  AudioSys.explosion(size);
}

function destroyDebris(a, awardScore = true) {
  a.dead = true;
  if (awardScore) addScore(DEBRIS_SCORE[a.size]);
  boom(a.x, a.y, a.size, COLOR.debris);
  // Every tier's destruction — including the final small-tier kill — emits exactly
  // DEBRIS_GARBAGE canisters (F3), each with an outward kick so they fan out instead
  // of stacking. All are mass 1.0 by the Garbage default.
  for (let i = 0; i < DEBRIS_GARBAGE; i++) {
    const spread = rand(0, TAU), kick = rand(20, 55);
    game.garbage.push(new Garbage(a.x, a.y,
      a.vx * 0.25 + Math.cos(spread) * kick,
      a.vy * 0.25 + Math.sin(spread) * kick));
  }
  // Large -> 3 mediums, medium -> 3 smalls, small -> destroyed (F3: 3-way splits)
  if (a.size > 1) {
    const speedMul = 1 + (game.wave - 1) * 0.08;
    for (let i = 0; i < 3; i++) {
      game.debris.push(new DebrisSatellite(a.x, a.y, a.size - 1, speedMul));
    }
  } else {
    maybeDropPowerup(a.x, a.y); // finishing off a lineage's smallest tier can drop a powerup (F6)
  }
}

// Destroy one Hunter Satellite: score + boom + garbage, then split — or, at the small tier,
// a larger burst of LOW-mass scrap and no children. Parallels destroyDebris (F3); the garbage
// fan-out mirrors that pattern. Called both when shot and when a homer dies on the shield.
function destroyHunter(h, awardScore = true) {
  h.dead = true;
  if (awardScore) addScore(HUNTER_SCORE[h.size]);
  boom(h.x, h.y, h.size, COLOR.satellite);
  if (h.size === 1) {
    // Final tier: an easy-to-tow bonus pile of low-mass canisters (mass 0.5, paler tint).
    for (let i = 0; i < HUNTER_SMALL_GARBAGE; i++) {
      const spread = rand(0, TAU), kick = rand(30, 70);
      game.garbage.push(new Garbage(h.x, h.y,
        h.vx * 0.25 + Math.cos(spread) * kick,
        h.vy * 0.25 + Math.sin(spread) * kick,
        GARBAGE_DECAY, HUNTER_SMALL_MASS));
    }
    maybeDropPowerup(h.x, h.y); // finishing off a Hunter line can drop a powerup (F6)
  } else {
    // Large/medium: 3 normal-mass canisters, then a 3-way split into actively-homing children.
    for (let i = 0; i < HUNTER_GARBAGE; i++) {
      const spread = rand(0, TAU), kick = rand(20, 55);
      game.garbage.push(new Garbage(h.x, h.y,
        h.vx * 0.25 + Math.cos(spread) * kick,
        h.vy * 0.25 + Math.sin(spread) * kick));
    }
    for (let i = 0; i < 3; i++) {
      const scatterAngle = (i / 3) * TAU + rand(-0.3, 0.3);
      game.hunters.push(new HunterSatellite(h.x, h.y, h.size - 1, scatterAngle));
    }
  }
}

// ---------- Powerups (F6) ----------
// Effective player-bullet cap. Triple Shot wins over Rapid Fire when both are active because its
// cap (12) is the higher of the two — the spec's "use the higher cap, don't multiply to 24".
function maxBullets() {
  if (game.powerFx.triple > 0) return TRIPLE_MAX_BULLETS; // 12 (also the Rapid+Triple combined cap)
  if (game.powerFx.rapid > 0)  return RAPID_MAX_BULLETS;  // 8
  return MAX_BULLETS;                                      // 4
}

// A modest chance for a small-tier kill (Debris or Hunter) to drop one random weapon/utility
// powerup, tying powerup access to finishing off a lineage. Health is NOT in this pool — it
// spawns ambiently. The single choke point for both destroy paths.
function maybeDropPowerup(x, y) {
  if (Math.random() >= POWERUP_DROP_CHANCE) return;
  const type = POWERUP_DROP_TYPES[Math.floor(Math.random() * POWERUP_DROP_TYPES.length)];
  const a = rand(0, TAU), kick = rand(20, 50);
  game.powerups.push(new Powerup(x, y, type, Math.cos(a) * kick, Math.sin(a) * kick));
}

// Ambient Health powerup — floats into the field in a reachable ring around the ship, one at a
// time (its decay bounds coexistence), on a saucer-like cadence.
function spawnHealthPowerup() {
  const a = rand(0, TAU), d = rand(POWERUP_HEALTH_MIN_DIST, POWERUP_HEALTH_MAX_DIST);
  const p = wrapPos({ x: game.ship.x + Math.cos(a) * d, y: game.ship.y + Math.sin(a) * d });
  game.powerups.push(new Powerup(p.x, p.y, "health"));
}

// Collect a powerup. Health is instant (repair, capped). The four timed effects REFRESH their
// duration (no magnitude stacking); different types run independently. A floater confirms the grab.
function applyPowerup(type) {
  if (type === "health") {
    game.ship.hp = Math.min(SHIP_MAX_HP, game.ship.hp + POWERUP_HEALTH_AMOUNT);
  } else {
    game.powerFx[type] = POWERUP_DURATION; // refresh, not add — same-type pickups extend, never stack
  }
  game.floaters.push(new FloatText(POWERUP_LABEL[type], game.ship.x, game.ship.y - 22, POWERUP_COLOR[type]));
  AudioSys.powerup();
}

// Apply an unshielded hit: subtract HP, knock the ship away from the hazard, and
// open a hit-stun i-frame window. Self-guarding — shielded, already-stunned, or dead
// hits are ignored, so only one hit lands per stun window even with several overlapping
// hazards in a frame. Lethal damage routes to killShip (game over). Returns whether
// damage was actually applied.
function damageShip(amount, srcX, srcY) {
  const s = game.ship;
  if (s.dead || s.shieldOn || s.invuln > 0) return false;
  s.hp -= amount;
  if (s.hp <= 0) {
    s.hp = 0;
    killShip();
    return true;
  }
  // Knockback: shove directly away from the hazard so the ship physically separates
  // instead of sitting inside it racking up damage. Set (not add) velocity so a hit
  // always pushes the ship clear regardless of its current momentum.
  const [dx, dy] = shortDelta(srcX, srcY, s.x, s.y); // vector from hazard to ship = away
  const d = Math.hypot(dx, dy);
  const a = d > 0.001 ? Math.atan2(dy, dx) : rand(0, TAU);
  s.vx = Math.cos(a) * KNOCKBACK_SPEED;
  s.vy = Math.sin(a) * KNOCKBACK_SPEED;
  s.invuln = HIT_STUN_DURATION;
  for (let i = 0; i < 6; i++) game.particles.push(new Particle(s.x, s.y, "#ff9060"));
  AudioSys.hit();
  return true;
}

function killShip() { // hull destroyed (0 HP): a true, permanent game over — no respawn (F2)
  if (game.ship.dead) return;
  game.ship.dead = true;
  AudioSys.thrust(false);
  boom(game.ship.x, game.ship.y, 3, COLOR.ship);
  scatterChain();
  game.state = "gameover";
  AudioSys.saucer(false);
}

// Shield deflection: bounce object away from ship, cost energy
function shieldDeflect(obj) {
  const a = angleTo(game.ship, obj);
  const sp = Math.hypot(obj.vx, obj.vy) || 80;
  obj.vx = Math.cos(a) * sp * 1.1;
  obj.vy = Math.sin(a) * sp * 1.1;
  if (obj.heading !== undefined) obj.heading = a;
  // push out of overlap
  obj.x = game.ship.x + Math.cos(a) * (SHIELD_RADIUS + obj.radius + 2);
  obj.y = game.ship.y + Math.sin(a) * (SHIELD_RADIUS + obj.radius + 2);
  game.ship.energy = Math.max(0, game.ship.energy - SHIELD_HIT_COST);
  AudioSys.shieldPing();
}

// ---------- Tow chain physics ----------
// Verlet nodes with position-based distance constraints, wrap-aware.
// The ship is the (mostly) kinematic head; nodes trail serpentine behind.
// A taut first link tugs real momentum back into the ship.

function chainAnchor() { // hitch point just behind the ship
  return {
    x: game.ship.x - Math.cos(game.ship.angle) * 12,
    y: game.ship.y - Math.sin(game.ship.angle) * 12
  };
}

// Total towed mass = Sum of node.mass (F5). All Debris-sourced canisters are mass 1.0,
// so for now this equals game.chain.length; lighter (Hunter-sourced) scrap will tow
// more easily once it exists. Drives the thrust/top-speed penalties and the momentum tug.
function chainMass() {
  const m = game.chain.reduce((sum, n) => sum + n.mass, 0);
  // Engine powerup (F6) temporarily lightens the EFFECTIVE towed mass. chainMass() is the single
  // quantity feeding thrustMul/maxSp (Ship.update) and the momentum-tug massFactor (updateChain),
  // so halving it here eases all three at once — "easier to maneuver even when towing garbage."
  return game.powerFx.engine > 0 ? m * ENGINE_MASS_MULT : m;
}

function wrapNode(n) { // wrap verlet nodes; shift prev pos too so velocity survives
  if (n.x < -60) { n.x += WORLD_W + 120; n.px += WORLD_W + 120; }
  if (n.x > WORLD_W + 60) { n.x -= WORLD_W + 120; n.px -= WORLD_W + 120; }
  if (n.y < -60) { n.y += WORLD_H + 120; n.py += WORLD_H + 120; }
  if (n.y > WORLD_H + 60) { n.y -= WORLD_H + 120; n.py -= WORLD_H + 120; }
}

function updateChain(dt) {
  const chain = game.chain;
  if (chain.length === 0 || game.ship.dead) return;

  // 1. Integrate: verlet inertia with heavy damping (space trash is sluggish)
  const damp = Math.pow(0.18, dt);
  for (const n of chain) {
    const vx = (n.x - n.px) * damp;
    const vy = (n.y - n.py) * damp;
    n.px = n.x; n.py = n.y;
    n.x += vx; n.y += vy;
    n.spin += n.spinRate * dt;
  }

  // 2. Momentum transfer: pre-constraint stretch of the first link measures
  //    how hard the cargo resisted the ship this frame; tug the ship back.
  const a0 = chainAnchor();
  const [tdx, tdy] = shortDelta(a0.x, a0.y, chain[0].x, chain[0].y);
  const td = Math.hypot(tdx, tdy);
  if (td > CHAIN_LINK) {
    const massFactor = Math.min(1.4, chainMass() * CARGO_MASS);
    const f = CHAIN_TUG * (td - CHAIN_LINK) * massFactor;
    game.ship.vx += (tdx / td) * f * dt;
    game.ship.vy += (tdy / td) * f * dt;
  }

  // 3. Relax distance constraints a few passes so the chain follows serpentine
  for (let iter = 0; iter < 3; iter++) {
    const a = chainAnchor();
    for (let i = 0; i < chain.length; i++) {
      const leader = i === 0 ? a : chain[i - 1];
      const n = chain[i];
      const [dx, dy] = shortDelta(leader.x, leader.y, n.x, n.y);
      const d = Math.hypot(dx, dy) || 0.0001;
      const diff = (d - CHAIN_LINK) / d;
      if (i === 0) {          // anchor is kinematic; node takes full correction
        n.x -= dx * diff; n.y -= dy * diff;
      } else {                // equal-mass nodes share the correction
        n.x -= dx * diff * 0.5; n.y -= dy * diff * 0.5;
        leader.x += dx * diff * 0.5; leader.y += dy * diff * 0.5;
      }
    }
  }
  chain.forEach(wrapNode);
}

function breakChain(i) { // node i destroyed; everything aft breaks loose
  const chain = game.chain;
  const hit = chain[i];
  boom(hit.x, hit.y, 1, COLOR.garbage);
  for (let j = i + 1; j < chain.length; j++) {
    game.garbage.push(Garbage.fromNode(chain[j]));
  }
  chain.length = i;
  game.deliveryCount = 0;
}

function scatterChain() { // ship destroyed: whole load breaks loose
  for (const n of game.chain) game.garbage.push(Garbage.fromNode(n));
  game.chain.length = 0;
  game.deliveryCount = 0;
}

function drawLink(x1, y1, x2, y2) {
  const [dx, dy] = shortDelta(x1, y1, x2, y2);
  if (Math.hypot(dx, dy) > 120) return; // don't streak across the wrap seam
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x1 + dx, y1 + dy);
  ctx.globalAlpha = 0.7;
  glowStroke(COLOR.chain, 1.2, 6);
  ctx.globalAlpha = 1;
}

function drawChain() {
  const chain = game.chain;
  if (!chain.length) return;
  // Chain nodes trail the ship but can straddle the world seam; map each point to
  // its nearest image relative to the camera so links/canisters render next to the ship.
  const cam = game.camera;
  const img = p => ({
    x: p.x + wrapOffset(p.x, cam.x, WORLD_W),
    y: p.y + wrapOffset(p.y, cam.y, WORLD_H)
  });
  if (!game.ship.dead) {
    const a = img(chainAnchor());
    const c0 = img(chain[0]);
    drawLink(a.x, a.y, c0.x, c0.y);
  }
  for (let i = 1; i < chain.length; i++) {
    const p = img(chain[i - 1]), q = img(chain[i]);
    drawLink(p.x, p.y, q.x, q.y);
  }
  for (const n of chain) { const p = img(n); drawCanister(p.x, p.y, n.spin, 1,
    n.mass < 1 ? COLOR.garbageLight : COLOR.garbage); }
}

// ---------- Update ----------
function update(dt) {
  if (game.state !== "playing" || game.paused) {
    AudioSys.thrust(false);
    return;
  }

  game.ship.update(dt);
  // Camera tracks the ship's world position every frame (world wraps, so no clamping)
  game.camera.x = game.ship.x;
  game.camera.y = game.ship.y;
  game.debris.forEach(a => a.update(dt));
  game.bullets.forEach(b => b.update(dt));
  game.saucers.forEach(s => s.update(dt));
  game.hunters.forEach(h => h.update(dt));
  game.particles.forEach(p => p.update(dt));
  game.floaters.forEach(f => f.update(dt));
  if (game.dock) game.dock.update(dt);

  // --- Salvage pickup & chain physics ---
  // Magnet (F6): while active, pull free garbage within an extended radius toward the ship (a real
  // attraction force reads better than a bigger invisible circle) AND widen the pickup radius.
  const magnet = game.powerFx.magnet > 0;
  const pickR = magnet ? GARBAGE_PICKUP * MAGNET_PICKUP_MULT : GARBAGE_PICKUP;
  for (const g of game.garbage) {
    g.update(dt);
    if (g.dead || game.ship.dead) continue;
    if (magnet) {
      const mr = GARBAGE_PICKUP * MAGNET_RANGE_MULT;
      if (dist2(g, game.ship) < mr * mr) {
        const [dx, dy] = shortDelta(g.x, g.y, game.ship.x, game.ship.y); // vector toward the ship
        const d = Math.hypot(dx, dy) || 0.0001;
        const damp = Math.pow(MAGNET_DAMP, dt);   // light in-range damping so the pull glides (not jitters)
        g.vx = g.vx * damp + (dx / d) * MAGNET_PULL * dt;
        g.vy = g.vy * damp + (dy / d) * MAGNET_PULL * dt;
      }
    }
    if (game.chain.length < CHAIN_MAX && dist2(g, game.ship) < pickR * pickR) {
      g.dead = true;
      game.chain.push({
        x: g.x, y: g.y, px: g.x, py: g.y,
        spin: g.spin, spinRate: g.spinRate, mass: g.mass  // carry towing weight onto the node (F5)
      });
      AudioSys.pickup();
    }
  }
  updateChain(dt);

  // --- Powerups: field pickups + active-effect countdown (F6) ---
  for (const p of game.powerups) {
    p.update(dt);
    if (!p.dead && !game.ship.dead) {
      const r = POWERUP_RADIUS + SHIP_RADIUS;
      if (dist2(p, game.ship) < r * r) { p.dead = true; applyPowerup(p.type); }
    }
  }
  for (const k in game.powerFx) {
    if (game.powerFx[k] > 0) game.powerFx[k] = Math.max(0, game.powerFx[k] - dt);
  }

  // --- Recycling dock offload ---
  if (game.dock) {
    const nearDock = !game.ship.dead &&
      dist2(game.ship, game.dock) < (DOCK_RADIUS + 10) * (DOCK_RADIUS + 10);
    if (nearDock && game.chain.length > 0) {
      game.offloadTimer -= dt;
      if (game.offloadTimer <= 0) {
        const node = game.chain.pop(); // canisters peel off from the tail
        game.deliveryCount++;
        const pts = DOCK_BASE_SCORE + DOCK_BONUS_STEP * (game.deliveryCount - 1);
        addScore(pts);
        game.floaters.push(new FloatText("+" + pts, node.x, node.y, COLOR.dock));
        AudioSys.deliver(game.deliveryCount);
        game.offloadTimer = 0.13;
      }
    } else {
      game.offloadTimer = 0;
      // combo resets once you leave the dock's neighborhood
      if (!game.ship.dead &&
          dist2(game.ship, game.dock) > (DOCK_RADIUS + 40) * (DOCK_RADIUS + 40)) {
        game.deliveryCount = 0;
      }
    }
  }

  // --- Spawning ---
  game.saucerTimer -= dt;
  if (game.saucerTimer <= 0 && game.saucers.length === 0) {
    // Small (aimed, dangerous) saucer gets more common as difficulty ramps (F10 — folds in
    // the old score>8000 gate so escalation is wave-driven in one place).
    const smallChance = ramp(SAUCER_SMALL_CHANCE_FLOOR, SAUCER_SMALL_CHANCE_CEIL, game.wave);
    const small = Math.random() < smallChance;
    game.saucers.push(new Saucer(small));
    AudioSys.saucer(true, small);
    // Longer gaps between saucers early, tightening toward the shipped cadence at full difficulty.
    const gapMin = ramp(SAUCER_GAP_FLOOR_MIN, SAUCER_GAP_CEIL_MIN, game.wave);
    const gapMax = ramp(SAUCER_GAP_FLOOR_MAX, SAUCER_GAP_CEIL_MAX, game.wave);
    game.saucerTimer = rand(gapMin, gapMax);
  }

  // One Hunter lineage at a time: a fresh large core only spawns once the whole family is
  // clear (core + any homing children). Cadence is unchanged from the old Satellite; only the
  // Hunters' movement speed/agility ramps with difficulty (F4), not how often they appear.
  game.hunterTimer -= dt;
  if (game.hunterTimer <= 0 && game.hunters.length === 0 && game.wave >= 2) {
    game.hunters.push(HunterSatellite.spawnCore());
    game.hunterTimer = rand(20, 32);
  }

  // Ambient Health powerup (F6): drifts into the field on a saucer-like cadence, at most one at a
  // time (its own decay bounds coexistence — like the one-saucer-at-a-time gate).
  game.healthTimer -= dt;
  if (game.healthTimer <= 0) {
    if (!game.powerups.some(p => p.type === "health")) spawnHealthPowerup();
    game.healthTimer = rand(POWERUP_HEALTH_GAP[0], POWERUP_HEALTH_GAP[1]);
  }

  // --- Collisions: player bullets vs targets ---
  for (const b of game.bullets) {
    if (b.dead) continue;
    if (!b.hostile) {
      for (const a of game.debris) {
        if (!a.dead && dist2(b, a) < a.radius * a.radius) {
          b.dead = true; destroyDebris(a); break;
        }
      }
      if (b.dead) continue;
      for (const s of game.saucers) {
        if (!s.dead && dist2(b, s) < s.radius * s.radius) {
          b.dead = true; s.dead = true;
          addScore(SAUCER_SCORE[s.small ? "small" : "big"]);
          boom(s.x, s.y, 2, COLOR.saucer);
          AudioSys.saucer(false);
          break;
        }
      }
      if (b.dead) continue;
      for (const h of game.hunters) {
        if (!h.dead && dist2(b, h) < (h.radius + 3) * (h.radius + 3)) {
          b.dead = true;
          destroyHunter(h);   // score + boom + garbage + 3-way split, all tiers
          break;
        }
      }
    } else {
      // hostile bullet vs player
      if (!game.ship.dead && game.ship.invuln <= 0) {
        const r = game.ship.shieldOn ? SHIELD_RADIUS : SHIP_RADIUS;
        if (dist2(b, game.ship) < r * r) {
          b.dead = true;
          if (game.ship.shieldOn) {
            game.ship.energy = Math.max(0, game.ship.energy - SHIELD_HIT_COST);
            AudioSys.shieldPing();
          } else damageShip(DMG_BULLET, b.x, b.y);
        }
      }
      // hostile bullet vs tow chain
      if (!b.dead && game.chain.length) {
        for (let i = 0; i < game.chain.length; i++) {
          if (dist2(b, game.chain[i]) < 9 * 9) {
            b.dead = true; breakChain(i); break;
          }
        }
      }
    }
  }

  // --- Collisions: hazards vs ship ---
  if (!game.ship.dead && game.ship.invuln <= 0) {
    const hazards = [...game.debris, ...game.hunters];
    for (const h of hazards) {
      if (h.dead) continue;
      const r = (game.ship.shieldOn ? SHIELD_RADIUS : SHIP_RADIUS) + h.radius;
      if (dist2(h, game.ship) < r * r) {
        if (game.ship.shieldOn) {
          // Homing Hunters (medium/small, the old fragile "wedges") die on shield contact
          // and still split; debris and the large Hunter core bounce off elastically.
          if (h instanceof HunterSatellite && h.size < 3) {
            game.ship.energy = Math.max(0, game.ship.energy - SHIELD_HIT_COST);
            AudioSys.shieldPing();
            destroyHunter(h);
          } else {
            shieldDeflect(h);
          }
        } else {
          damageShip(h.damage, h.x, h.y);
        }
      }
    }
    // saucer body contact
    for (const s of game.saucers) {
      if (s.dead) continue;
      const r = (game.ship.shieldOn ? SHIELD_RADIUS : SHIP_RADIUS) + s.radius;
      if (dist2(s, game.ship) < r * r) {
        if (game.ship.shieldOn) {
          s.dead = true;
          addScore(SAUCER_SCORE[s.small ? "small" : "big"]);
          boom(s.x, s.y, 2, COLOR.saucer);
          AudioSys.saucer(false);
        } else damageShip(s.damage, s.x, s.y);
      }
    }
  }

  // --- Hazards vs tow chain: a hit destroys that canister and cuts loose
  //     everything behind it (falls back to free garbage) ---
  if (game.chain.length) {
    const chainHazards = [...game.debris, ...game.hunters];
    chainScan:
    for (let i = 0; i < game.chain.length; i++) {
      const n = game.chain[i];
      for (const h of chainHazards) {
        if (h.dead) continue;
        const r = h.radius + 7;
        if (dist2(n, h) < r * r) { breakChain(i); break chainScan; }
      }
    }
  }

  // Saucer bullets can shatter debris satellites too (classic behavior)
  for (const b of game.bullets) {
    if (b.dead || !b.hostile) continue;
    for (const a of game.debris) {
      if (!a.dead && dist2(b, a) < a.radius * a.radius) {
        b.dead = true; destroyDebris(a, false); break;
      }
    }
  }

  // --- Cleanup ---
  const hadSaucer = game.saucers.length > 0;
  game.debris = game.debris.filter(a => !a.dead);
  game.bullets = game.bullets.filter(b => !b.dead);
  game.saucers = game.saucers.filter(s => !s.dead);
  game.hunters = game.hunters.filter(h => !h.dead);
  game.particles = game.particles.filter(p => !p.dead);
  game.garbage = game.garbage.filter(g => !g.dead);
  game.floaters = game.floaters.filter(f => !f.dead);
  game.powerups = game.powerups.filter(p => !p.dead);
  if (hadSaucer && game.saucers.length === 0) AudioSys.saucer(false);

  // --- Wave clear ---
  if (game.debris.length === 0 && game.hunters.length === 0) {
    game.waveClearTimer += dt;
    if (game.waveClearTimer > 2.5) {
      game.waveClearTimer = 0;
      nextWave();
    }
  } else {
    game.waveClearTimer = 0;
  }

  // --- Heartbeat ---
  const density = game.debris.length + game.hunters.length * 2;
  game.beatInterval = Math.max(0.28, 1.05 - game.wave * 0.04 - Math.max(0, (14 - density)) * 0.02);
  game.beatTimer -= dt;
  if (game.beatTimer <= 0 && !game.ship.dead && density > 0) {
    AudioSys.beat(game.beatHigh);
    game.beatHigh = !game.beatHigh;
    game.beatTimer = game.beatInterval;
  }
}

// ---------- Draw ----------
function drawText(str, x, y, size, color = COLOR.text, align = "center") {
  ctx.font = `${size}px monospace`;
  ctx.textAlign = align;
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 8;
  ctx.fillText(str, x, y);
  ctx.shadowBlur = 0;
}

// Background stars scattered across the whole world (count scales with world area
// to preserve the original on-screen density). Drawn in screen space, wrap-aware,
// so the field scrolls seamlessly and never shows a tiling repeat or an edge seam.
const STAR_COUNT = Math.round(STAR_DENSITY * (WORLD_W * WORLD_H) / (VIEW_W * VIEW_H));
const stars = [];
for (let i = 0; i < STAR_COUNT; i++) {
  stars.push({ x: Math.random() * WORLD_W, y: Math.random() * WORLD_H, s: rand(1, 1.8) });
}

function drawStarfield() {
  ctx.fillStyle = "#1a2a40";
  const cam = game.camera;
  for (const st of stars) {
    const [dx, dy] = shortDelta(cam.x, cam.y, st.x, st.y);
    if (Math.abs(dx) > VIEW_W / 2 || Math.abs(dy) > VIEW_H / 2) continue;
    ctx.fillRect(dx + VIEW_W / 2, dy + VIEW_H / 2, st.s, st.s);
  }
}

// Is a world-space entity within the viewport (plus a margin)? Wrap-aware.
function onScreen(e, margin = CULL_MARGIN) {
  const [dx, dy] = shortDelta(game.camera.x, game.camera.y, e.x, e.y);
  const r = e.radius || 0;
  return Math.abs(dx) <= VIEW_W / 2 + margin + r && Math.abs(dy) <= VIEW_H / 2 + margin + r;
}

// Cull, then draw a world entity at its nearest wrapped image relative to the camera.
// Called inside the camera transform, so world coords map straight to the screen.
function drawEntity(e) {
  if (!onScreen(e)) return;
  const cam = game.camera;
  const ox = wrapOffset(e.x, cam.x, WORLD_W);
  const oy = wrapOffset(e.y, cam.y, WORLD_H);
  if (ox || oy) { ctx.save(); ctx.translate(ox, oy); e.draw(); ctx.restore(); }
  else e.draw();
}

function draw() {
  ctx.clearRect(0, 0, VIEW_W, VIEW_H);
  drawStarfield();

  if (game.state === "title") {
